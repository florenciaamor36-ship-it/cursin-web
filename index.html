<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursin V2 - La Mina de Oro</title>
    <link rel="stylesheet" href="style.css?v=6">
    <style>
        :root { --gold: #eab308; --dark: #1f2937; }
        .is-featured { border: 2px solid var(--gold) !important; background: rgba(234, 179, 8, 0.05); }
        .badge-featured { background: var(--gold); color: black; padding: 4px 8px; font-size: 10px; font-weight: 900; border-radius: 4px; margin-bottom: 8px; display: inline-block; }
        
        /* Estilos de la tarjeta */
        .card { cursor: pointer; transition: 0.3s; overflow: hidden; border: 1px solid #eee; border-radius: 12px; background: white; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card-body { padding: 15px; }
        .card h3 { font-size: 1.1rem; margin: 0 0 10px 0; color: var(--dark); line-height: 1.3; }
        .card .desc-short { font-size: 0.9rem; color: #666; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Estilos del Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(8px); padding: 20px; }
        .modal-content { background: white; padding: 0; border-radius: 20px; max-width: 600px; width: 100%; position: relative; overflow: hidden; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); z-index: 10; }
        .modal-img { width: 100%; height: 250px; background-size: cover; background-position: center; }
        .modal-body { padding: 30px; }
        .modal-body h2 { margin-top: 0; font-size: 1.5rem; color: var(--dark); }
        .modal-body p { color: #4b5563; line-height: 1.7; font-size: 1rem; margin: 20px 0; max-height: 200px; overflow-y: auto; }
        .btn-main { display: block; width: 100%; padding: 18px; background: #2563eb; color: white; text-align: center; text-decoration: none; font-weight: bold; border-radius: 12px; font-size: 1.1rem; transition: 0.3s; }
        .btn-main:hover { background: #1d4ed8; }
        
        .filters select { padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin: 5px; }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <h1>Cursin V2 📚</h1>
            <p id="totalCount">Sincronizando la mina de oro...</p>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="¿Qué quieres aprender? (Ej: Python, UNAM, Inglés...)">
            </div>
            <div class="filters">
                <select id="categoryFilter"><option value="">Todas las Categorías</option></select>
                <select id="platformFilter">
                    <option value="">Todas las Plataformas</option>
                    <option value="YouTube">YouTube</option>
                    <option value="Santander">Santander</option>
                    <option value="MexicoX">MexicoX</option>
                    <option value="UNAM">UNAM</option>
                    <option value="Coursera">Coursera</option>
                    <option value="edX">edX</option>
                </select>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="courseGrid" class="grid"></div>
        <div id="loading" class="loading">Buscando...</div>
    </main>

    <!-- Modal Estructurado -->
    <div id="courseModal" class="modal-overlay">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            <div id="modalImg" class="modal-img"></div>
            <div class="modal-body">
                <div id="modalTags" style="margin-bottom:15px;"></div>
                <h2 id="modalTitle"></h2>
                <p id="modalDesc"></p>
                <a id="modalLink" href="#" target="_blank" class="btn-main">Empezar a aprender ahora</a>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/';
        const S_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        
        const grid = document.getElementById('courseGrid');
        const searchInput = document.getElementById('searchInput');
        const catFilter = document.getElementById('categoryFilter');
        const platFilter = document.getElementById('platformFilter');
        const totalCount = document.getElementById('totalCount');

        function openModal(c) {
            const thumb = getThumb(c);
            document.getElementById('modalImg').style.backgroundImage = `url('${thumb}')`;
            document.getElementById('modalTitle').textContent = c.titulo;
            document.getElementById('modalDesc').textContent = c.descripcion || 'Este curso no tiene una descripción detallada, pero es gratuito y tiene certificación oficial.';
            document.getElementById('modalLink').href = c.url;
            document.getElementById('modalTags').innerHTML = `<span class="tag tag-plat">${c.plataforma}</span> <span class="tag tag-cat">${c.categorias ? c.categorias.nombre : 'General'}</span>`;
            document.getElementById('courseModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        window.closeModal = () => {
            document.getElementById('courseModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        };

        function getThumb(c) {
            if (c.thumbnail_url && c.thumbnail_url.includes('http')) return c.thumbnail_url;
            const cat = (c.categorias ? c.categorias.nombre : '').toLowerCase();
            if (cat.includes('program')) return 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=600';
            if (cat.includes('idioma')) return 'https://images.unsplash.com/photo-1543167664-40d6994796a1?w=600';
            return 'https://images.unsplash.com/photo-1513258496099-48168024aec0?w=600';
        }

        async function fetchCourses() {
            const q = searchInput.value;
            const cat = catFilter.value;
            const plat = platFilter.value;
            
            document.getElementById('loading').style.display = 'block';
            grid.innerHTML = '';

            let url = `${S_URL}cursos?select=*,categorias(nombre)&limit=60`;
            if (q) url += `&or=(titulo.ilike.*${q}*,descripcion.ilike.*${q}*)`;
            if (cat) url += `&categorias.nombre=eq.${cat}`;
            if (plat) url += `&plataforma.ilike.*${plat}*`;
            url += '&order=created_at.desc';

            try {
                const r = await fetch(url, { headers: { 'apikey': S_KEY, 'Authorization': `Bearer ${S_KEY}` } });
                const data = await r.json();
                data.forEach(c => {
                    const isF = (c.plataforma||'').toLowerCase().includes('santander') || (c.plataforma||'').toLowerCase().includes('unam');
                    const div = document.createElement('div');
                    div.className = `card ${isF ? 'is-featured' : ''}`;
                    div.onclick = () => openModal(c);
                    div.innerHTML = `
                        <div style="height:150px; background:url('${getThumb(c)}') center/cover;"></div>
                        <div class="card-body">
                            ${isF ? '<span class="badge-featured">OFICIAL</span>' : ''}
                            <h3>${c.titulo}</h3>
                            <p class="desc-short">${c.descripcion || ''}</p>
                            <div class="tag-row" style="margin-top:10px;">
                                <span class="tag tag-plat">${c.plataforma}</span>
                            </div>
                        </div>`;
                    grid.appendChild(div);
                });
            } finally { document.getElementById('loading').style.display = 'none'; }
        }

        async function init() {
            const rc = await fetch(S_URL + 'categorias', { headers: { 'apikey': S_KEY } });
            (await rc.json()).sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(c => {
                const o = document.createElement('option'); o.value = c.nombre; o.textContent = c.nombre; catFilter.appendChild(o);
            });
            fetchCourses();
            const rt = await fetch(S_URL + 'cursos?select=count', { headers: { 'apikey': S_KEY } });
            totalCount.textContent = `Acceso a ${(await rt.json())[0].count.toLocaleString()} cursos gratuitos.`;
        }

        let t;
        searchInput.addEventListener('input', () => { clearTimeout(t); t = setTimeout(fetchCourses, 400); });
        catFilter.addEventListener('change', fetchCourses);
        platFilter.addEventListener('change', fetchCourses);
        init();
    </script>
</body></html>
