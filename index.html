<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursin V2 - La Mina de Oro</title>
    <style>
        :root { --blue: #2563eb; --dark: #111827; --emerald: #059669; --gold: #eab308; }
        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; background: #f4f7fa; color: var(--dark); }
        
        header { background: white; padding: 40px 20px; text-align: center; border-bottom: 1px solid #e5e7eb; }
        .stats { background: #ecfdf5; color: var(--emerald); padding: 6px 16px; border-radius: 99px; font-weight: 700; font-size: 0.9rem; display: inline-block; margin-bottom: 15px; }
        
        .search-container { max-width: 800px; margin: 20px auto; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        input, select { padding: 12px 18px; border-radius: 10px; border: 1px solid #d1d5db; font-size: 0.95rem; }
        
        .container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        /* Tarjeta corregida */
        .card { background: white; border-radius: 16px; border: 1px solid #e5e7eb; overflow: hidden; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; height: 100%; position: relative; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        
        /* Contenedor de imagen corregido para logos y miniaturas */
        .card-img-container { height: 160px; width: 100%; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; border-bottom: 1px solid #f0f0f0; position: relative; }
        .card-img-container img { max-width: 100%; max-height: 100%; object-fit: contain; padding: 10px; transition: 0.3s; }
        /* Si es una miniatura de curso real (no logo), usamos cover */
        .card-img-container img.is-thumb { object-fit: cover; padding: 0; width: 100%; height: 100%; }

        .badge-official { position: absolute; top: 12px; left: 12px; background: var(--gold); color: black; padding: 3px 8px; border-radius: 4px; font-weight: 800; font-size: 0.7rem; z-index: 2; }
        
        .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .plat-tag { font-size: 0.7rem; font-weight: 700; color: var(--blue); text-transform: uppercase; margin-bottom: 8px; }
        .card h3 { margin: 0 0 10px 0; font-size: 1.1rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card p { font-size: 0.85rem; color: #6b7280; margin: 0; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        /* Paginación */
        .pagination { margin: 40px 0; text-align: center; display: flex; justify-content: center; gap: 15px; align-items: center; }
        .btn-pag { padding: 10px 25px; background: white; border: 1px solid #d1d5db; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-pag:hover:not(:disabled) { background: #f9fafb; border-color: var(--blue); color: var(--blue); }
        .btn-pag:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(8px); padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; border-radius: 24px; max-width: 600px; width: 100%; overflow: hidden; position: relative; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 2.5rem; cursor: pointer; color: #999; z-index: 10; }
        .modal-header-img { height: 220px; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .modal-header-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .modal-body { padding: 35px; }
        .btn-go { display: block; background: var(--blue); color: white; text-align: center; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 1.1rem; margin-top: 25px; }
    </style>
</head>
<body>
    <header>
        <div class="stats">🚀 <span id="total-count">...</span> CURSOS CERTIFICADOS</div>
        <h1>Cursin V2 📚</h1>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="¿Qué quieres aprender?">
            <select id="cat-filter"><option value="">Categorías</option></select>
            <select id="plat-filter"><option value="">Plataformas</option></select>
        </div>
    </header>

    <div class="container">
        <div id="course-grid" class="grid"></div>
        <div id="loader" style="text-align:center; padding:50px;">⛏️ Picando la mina...</div>
        
        <div class="pagination">
            <button id="prev-btn" class="btn-pag" disabled>Anterior</button>
            <span id="page-info">Página 1</span>
            <button id="next-btn" class="btn-pag">Siguiente</button>
        </div>
    </div>

    <div id="course-modal" class="modal" onclick="if(event.target==this)closeM()">
        <span class="modal-close" onclick="closeM()">&times;</span>
        <div class="modal-content">
            <div id="m-header" class="modal-header-img"></div>
            <div class="modal-body">
                <div id="m-plat" class="plat-tag"></div>
                <h2 id="m-title" style="margin:0 0 15px 0;"></h2>
                <p id="m-desc" style="color:#4b5563; line-height:1.7;"></p>
                <a id="m-link" href="#" target="_blank" class="btn-go">ACCEDER AL CURSO GRATIS</a>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/';
        const S_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const headers = { 'apikey': S_KEY, 'Authorization': 'Bearer ' + S_KEY };
        
        let page = 0;
        const limit = 24;

        function getImgHtml(c, isModal = false) {
            let src = c.imagen_url || '';
            const isLogo = src.toLowerCase().includes('logo') || c.plataforma.toLowerCase().includes('youtube') || c.plataforma.toLowerCase().includes('microsoft');
            
            if (!src || src === '') {
                src = 'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=600';
            }
            
            return `<img src="${src}" class="${isLogo ? 'is-logo' : 'is-thumb'}" onerror="this.src='https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=600'">`;
        }

        function openM(c) {
            document.getElementById('m-header').innerHTML = getImgHtml(c, true);
            document.getElementById('m-title').innerText = c.titulo;
            document.getElementById('m-desc').innerText = c.descripcion || "Curso oficial con certificación gratuita disponible.";
            document.getElementById('m-plat').innerText = c.plataforma;
            document.getElementById('m-link').href = c.url;
            document.getElementById('course-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        function closeM() { document.getElementById('course-modal').style.display = 'none'; document.body.style.overflow = 'auto'; }

        async function fetchCourses() {
            const grid = document.getElementById('course-grid');
            const loader = document.getElementById('loader');
            const search = document.getElementById('search-input').value;
            const cat = document.getElementById('cat-filter').value;
            const plat = document.getElementById('plat-filter').value;

            loader.style.display = 'block';
            grid.innerHTML = '';

            let u = `${S_URL}cursos?select=*,categorias(nombre)&limit=${limit}&offset=${page * limit}`;
            if (search) u += `&or=(titulo.ilike.*${encodeURIComponent(search)}*,descripcion.ilike.*${encodeURIComponent(search)}*)`;
            if (cat) u += `&categorias.nombre=eq.${encodeURIComponent(cat)}`;
            if (plat) u += `&plataforma.eq.${encodeURIComponent(plat)}`;
            u += '&order=creado_el.desc';

            try {
                const r = await fetch(u, { headers });
                const data = await r.json();
                loader.style.display = 'none';
                data.forEach(c => {
                    const isOff = ['santander', 'unam', 'mexicox', 'google'].some(v => c.plataforma.toLowerCase().includes(v));
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openM(c);
                    card.innerHTML = `
                        <div class="card-img-container">
                            ${isOff ? '<div class="badge-official">OFICIAL</div>' : ''}
                            ${getImgHtml(c)}
                        </div>
                        <div class="card-body">
                            <div class="plat-tag">${c.plataforma}</div>
                            <h3>${c.titulo}</h3>
                            <p>${c.descripcion || ''}</p>
                        </div>`;
                    grid.appendChild(card);
                });
                
                document.getElementById('prev-btn').disabled = page === 0;
                document.getElementById('next-btn').disabled = data.length < limit;
                document.getElementById('page-info').innerText = `Página ${page + 1}`;
            } catch (e) { loader.innerText = 'Error de conexión.'; }
        }

        async function init() {
            const rc = await fetch(S_URL + 'categorias', { headers });
            const cats = await rc.json();
            const cs = document.getElementById('cat-filter');
            cats.sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(c => {
                cs.innerHTML += `<option value="${c.nombre}">${c.nombre}</option>`;
            });

            const rp = await fetch(S_URL + 'cursos?select=plataforma', { headers });
            const plats = [...new Set((await rp.json()).map(p => p.plataforma))].sort();
            const ps = document.getElementById('plat-filter');
            plats.forEach(p => { ps.innerHTML += `<option value="${p}">${p}</option>`; });

            const rt = await fetch(S_URL + 'cursos?select=count', { headers });
            document.getElementById('total-count').innerText = (await rt.json())[0].count.toLocaleString();
            
            fetchCourses();
        }

        document.getElementById('search-input').oninput = () => { page=0; clearTimeout(window.t); window.t = setTimeout(fetchCourses, 600); };
        document.getElementById('cat-filter').onchange = () => { page=0; fetchCourses(); };
        document.getElementById('plat-filter').onchange = () => { page=0; fetchCourses(); };
        document.getElementById('prev-btn').onclick = () => { page--; fetchCourses(); window.scrollTo(0,0); };
        document.getElementById('next-btn').onclick = () => { page++; fetchCourses(); window.scrollTo(0,0); };
        init();
    </script>
</body>
</html>
