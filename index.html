<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursin V2 - La Mina de Oro</title>
    <style>
        :root { --blue: #2563eb; --dark: #111827; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #f9fafb; color: var(--dark); }
        header { background: white; padding: 40px 20px; text-align: center; border-bottom: 1px solid #eee; }
        .stats { background: #ecfdf5; color: #059669; padding: 5px 15px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; border: 1px solid #e5e7eb; overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .card-img { height: 150px; background-size: cover; background-position: center; background-color: #ddd; }
        .card-body { padding: 15px; }
        .card h3 { margin: 0 0 10px 0; font-size: 1.1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card p { font-size: 0.9rem; color: #6b7280; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin: 0; }
        .hint { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; }
        
        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; border-radius: 20px; max-width: 600px; width: 100%; overflow: hidden; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: #999; z-index: 10; }
        .modal-img { height: 200px; background-size: cover; background-position: center; }
        .modal-body { padding: 25px; }
        .btn { display: block; background: var(--blue); color: white; text-align: center; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 20px; }
        
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin: 5px; font-size: 1rem; }
    </style>
</head>
<body>
    <div style="background: #111827; color: white; text-align: center; padding: 10px; font-size: 0.9rem;">💡 Haz clic en un curso para ver detalles y certificado</div>
    <header>
        <div class="stats">🚀 <span id="count">65,650</span> CURSOS DISPONIBLES</div>
        <h1>Cursin V2 📚</h1>
        <input type="text" id="search" placeholder="¿Qué quieres aprender?" style="width: 80%; max-width: 400px;">
        <br>
        <select id="cat"><option value="">Categorías</option></select>
        <select id="plat">
            <option value="">Plataformas</option>
            <option value="YouTube">YouTube</option>
            <option value="Santander">Santander</option>
            <option value="UNAM">UNAM</option>
            <option value="MexicoX">MexicoX</option>
        </select>
    </header>

    <div id="grid" class="grid"></div>
    <div id="msg" style="text-align:center; padding:50px;">Cargando la mina de oro...</div>

    <div id="modal" class="modal" onclick="if(event.target==this)closeM()">
        <div class="modal-content">
            <span class="modal-close" onclick="closeM()">&times;</span>
            <div id="mImg" class="modal-img"></div>
            <div class="modal-body">
                <h2 id="mTitle" style="margin-top:0;"></h2>
                <p id="mDesc"></p>
                <a id="mLink" href="#" target="_blank" class="btn">IR AL CURSO Y CERTIFICARME</a>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://ypzudkxowpxvdggvongz.supabase.co/rest/v1/';
        const S_KEY = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const headers = { 'apikey': S_KEY, 'Authorization': 'Bearer ' + S_KEY };

        function getImg(c) {
            if (c.thumbnail_url && c.thumbnail_url.includes('http')) return c.thumbnail_url;
            const cat = (c.categorias ? c.categorias.nombre : '').toLowerCase();
            if (cat.includes('prog')) return 'https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=600';
            if (cat.includes('ingl') || cat.includes('idio')) return 'https://images.unsplash.com/photo-1543167664-40d6994796a1?w=600';
            return 'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=600';
        }

        function openM(c) {
            document.getElementById('mImg').style.backgroundImage = "url('" + getImg(c) + "')";
            document.getElementById('mTitle').innerText = c.titulo;
            document.getElementById('mDesc').innerText = c.descripcion || "Curso gratuito con certificación oficial disponible.";
            document.getElementById('mLink').href = c.url;
            document.getElementById('modal').style.display = 'flex';
        }
        function closeM() { document.getElementById('modal').style.display = 'none'; }

        async function load() {
            const q = document.getElementById('search').value;
            const ct = document.getElementById('cat').value;
            const pl = document.getElementById('plat').value;
            const grid = document.getElementById('grid');
            const msg = document.getElementById('msg');
            
            msg.style.display = 'block';
            grid.innerHTML = '';

            let u = S_URL + 'cursos?select=*,categorias(nombre)&limit=100';
            if (q) u += '&or=(titulo.ilike.*' + q + '*,descripcion.ilike.*' + q + '*)';
            if (ct) u += '&categorias.nombre=eq.' + ct;
            if (pl) u += '&plataforma.ilike.*' + pl + '*';
            u += '&order=created_at.desc';

            try {
                const r = await fetch(u, { headers });
                const data = await r.json();
                msg.style.display = 'none';
                if (data.length === 0) msg.innerText = 'No se encontraron cursos.';
                data.forEach(c => {
                    const d = document.createElement('div');
                    d.className = 'card';
                    d.onclick = () => openM(c);
                    d.innerHTML = '<div class="card-img" style="background-image:url(\'' + getImg(c) + '\')"></div>' +
                                  '<div class="card-body"><span style="font-size:0.7rem;color:var(--blue);font-weight:bold;">' + c.plataforma + '</span>' +
                                  '<h3>' + c.titulo + '</h3><p>' + (c.descripcion || '') + '</p></div>' +
                                  '<div class="hint">Ver más</div>';
                    grid.appendChild(d);
                });
            } catch (e) { msg.innerText = 'Error al conectar con la base de datos.'; }
        }

        async function init() {
            try {
                const rc = await fetch(S_URL + 'categorias', { headers });
                const cats = await rc.json();
                const sel = document.getElementById('cat');
                cats.sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(c => {
                    const o = document.createElement('option'); o.value = c.nombre; o.innerText = c.nombre; sel.appendChild(o);
                });
                
                const rt = await fetch(S_URL + 'cursos?select=count', { headers });
                const counts = await rt.json();
                document.getElementById('count').innerText = counts[0].count.toLocaleString();
                
                load();
            } catch (e) { console.error(e); }
        }

        document.getElementById('search').oninput = () => { clearTimeout(window.t); window.t = setTimeout(load, 500); };
        document.getElementById('cat').onchange = load;
        document.getElementById('plat').onchange = load;
        init();
    </script>
</body>
</html>
